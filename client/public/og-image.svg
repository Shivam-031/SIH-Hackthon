<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="160" fill="white" opacity="0.04"/>
  <circle cx="1120" cy="550" r="200" fill="white" opacity="0.04"/>
  <circle cx="1100" cy="100" r="80" fill="white" opacity="0.06"/>

  <!-- Map pin icon group (centered left of text) -->
  <g transform="translate(280, 195)" filter="url(#shadow)">
    <!-- Pin body -->
    <path d="M100 0 C55 0 18 37 18 82 C18 127 65 178 100 210 C135 178 182 127 182 82 C182 37 145 0 100 0 Z"
          fill="url(#pinGrad)" opacity="0.95"/>
    <!-- Pin inner circle -->
    <circle cx="100" cy="80" r="38" fill="#1e40af" opacity="0.85"/>
    <!-- White checkmark/connect symbol inside -->
    <g fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="100" cy="80" r="18" stroke="white" stroke-width="5" fill="none" opacity="0.9"/>
      <line x1="88" y1="80" x2="96" y2="88" opacity="0.9"/>
      <line x1="96" y1="88" x2="112" y2="72" opacity="0.9"/>
    </g>
    <!-- Pin shadow tip -->
    <ellipse cx="100" cy="218" rx="18" ry="6" fill="black" opacity="0.15"/>
  </g>

  <!-- Connection dots around pin (map feel) -->
  <g opacity="0.5">
    <circle cx="230" cy="250" r="6" fill="white"/>
    <circle cx="510" cy="200" r="4" fill="white"/>
    <circle cx="470" cy="420" r="5" fill="white"/>
    <line x1="236" y1="250" x2="380" y2="295" stroke="white" stroke-width="1.5" stroke-dasharray="6,4"/>
    <line x1="510" y1="204" x2="460" y2="350" stroke="white" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>

  <!-- Main wordmark -->
  <text x="520" y="330"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="800"
        font-size="108"
        letter-spacing="-3"
        fill="white">
    Civic
  </text>
  <text x="520" y="440"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="800"
        font-size="108"
        letter-spacing="-3"
        fill="white"
        opacity="0.85">
    Connect
  </text>

  <!-- Tagline -->
  <text x="522" y="492"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-weight="400"
        font-size="28"
        letter-spacing="1"
        fill="white"
        opacity="0.65">
    Bridging Communities &amp; Government
  </text>

  <!-- Bottom accent bar -->
  <rect x="520" y="310" width="5" height="140" rx="3" fill="#60a5fa" opacity="0.7"/>
</svg>
